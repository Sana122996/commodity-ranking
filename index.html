<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全球大宗商品产量版图</title>
    <style>
      :root {
        --primary: #235de6; 
        --secondary: #E02424;
        --tertiary: #057A55;
        --primary-rgb: 35, 93, 230;
        --secondary-rgb: 224, 36, 36;
        --tertiary-rgb: 5, 122, 85;
        --bg: #FFFFFF; /* 强制绝对白底 */
        --text: #111111;
        --sub: rgba(17, 17, 17, 0.58);
        --page-max-width: 500px;
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

      body {
        margin: 0;
        font-family: "Inter", "Roboto", "Noto Sans CJK SC", sans-serif;
        color: var(--text);
        background: #FFFFFF; /* 强制白底 */
      }

      .layout { min-height: 100vh; display: block; width: 100%; max-width: 100%; margin: 0 auto; background: #FFFFFF; }

      .sidebar {
        border-bottom: 1px solid rgba(35, 93, 230, 0.12);
        background: #FFFFFF; /* 去除渐变，强制白底 */
        padding: 18px 14px 12px;
        display: flex; flex-direction: column; gap: 12px;
      }

      .masthead { display: flex; flex-direction: column; gap: 4px; }
      .brand-lockup { display: inline-flex; align-items: center; margin-bottom: 4px; }
      .brand-logo { display: block; width: 104px; height: auto; }
      .title { margin: 0; font-size: 31px; line-height: 1.08; letter-spacing: -0.045em; font-weight: 800; }

      /* === 顶部双按钮 === */
      .mode-toolbar { display: flex; gap: 10px; margin-top: 4px; }
      .mode-btn {
        flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
        height: 44px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s ease;
      }
      .mode-btn.active { background: var(--primary); color: #ffffff; border: 1px solid var(--primary); }
      .mode-btn:not(.active) { background: #f2f6ff; color: var(--primary); border: 1px solid #dce5fc; }
      .mode-btn .caret { font-size: 10px; }

      /* === 底部弹出分栏选择器 === */
      .picker-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; 
        display: none; align-items: flex-end; justify-content: center; 
        opacity: 0; transition: opacity 0.2s ease;
      }
      .picker-overlay.is-open { display: flex; opacity: 1; }
      
      .picker-dialog {
        width: 100%; max-width: var(--page-max-width); background: #fff;
        border-radius: 16px 16px 0 0; overflow: hidden; display: flex; flex-direction: column;
        transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .picker-overlay.is-open .picker-dialog { transform: translateY(0); }

      .picker-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 16px; border-bottom: 1px solid #f0f0f0;
      }
      .picker-title { font-size: 16px; font-weight: 700; color: #333; }
      .picker-btn { font-size: 15px; border: none; background: transparent; cursor: pointer; padding: 4px 8px; }
      .picker-btn.cancel { color: #888; }
      .picker-btn.confirm { color: var(--primary); font-weight: 700; }

      .picker-body { display: flex; height: 320px; }
      
      .picker-col-left { width: 40%; background: #f7f8fa; overflow-y: auto; }
      .picker-col-right { width: 60%; background: #ffffff; overflow-y: auto; }
      
      .picker-item { padding: 16px 20px; text-align: left; font-size: 15px; color: #333; cursor: pointer; }
      .picker-col-left .picker-item.active { background: #e6f0ff; color: var(--primary); font-weight: 600; border-left: 3px solid var(--primary); padding-left: 17px; }
      .picker-col-right .picker-item.active { color: var(--primary); font-weight: 600; display: flex; justify-content: space-between; }
      .picker-col-right .picker-item.active::after { content: "✓"; color: var(--primary); }

      /* === 看板与树图 === */
      .main { padding: 14px 14px 20px; display: flex; flex-direction: column; gap: 12px; background: #FFFFFF; /* 强制白底 */ }
      .header-row { display: flex; justify-content: flex-start; gap: 8px; align-items: flex-start; padding-top: 2px; }
      .title-stack { display: flex; flex-direction: column; gap: 6px; }
      .headline-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .header-row h2 { margin: 0; font-size: 26px; line-height: 1.16; letter-spacing: -0.03em; color: var(--text); font-weight: 600; }
      .header-row p { margin: 0; color: var(--sub); font-size: 12px; }
      
      .topic-tags { display: flex; flex-wrap: wrap; gap: 6px; }
      .topic-tag { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 999px; border: 1px solid rgba(var(--primary-rgb), 0.1); background: rgba(var(--primary-rgb), 0.05); color: var(--primary); font-size: 11px; font-weight: 500; line-height: 1; white-space: nowrap; }

      .hero-panel { background: #fff; border: 1px solid rgba(var(--primary-rgb), 0.08); border-radius: 16px; padding: 16px; }
      .hero-title { color: var(--text); font-size: 15px; font-weight: 500; line-height: 1.45; }
      .hero-title strong { color: var(--primary); font-weight: 600; font-size: 30px; line-height: 1; letter-spacing: -0.03em; margin: 4px 2px; display: inline-block; }
      
      .treemap-shell { margin-top: 16px; display: grid; grid-template-columns: minmax(0, 1fr); gap: 12px; }
      .treemap { position: relative; min-height: 320px; border-radius: 16px; overflow: hidden; background: #FFFFFF; border: 1px solid rgba(var(--primary-rgb), 0.08); }
      .treemap-block { position: absolute; padding: 11px; border: 1px solid #FFFFFF; overflow: hidden; }
      .treemap-block::after { content: ""; position: absolute; inset: 0; background: linear-gradient(145deg, rgba(255, 255, 255, 0.15), transparent 55%); pointer-events: none; }
      .treemap-block-inner { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 6px; }
      .treemap-name { font-size: 16px; font-weight: 800; line-height: 1.2; word-break: break-all; }
      .treemap-value { font-size: 20px; font-weight: 900; line-height: 1; letter-spacing: -0.03em; white-space: nowrap; }
      .treemap-value-sub { font-size: 10px; font-weight: 700; opacity: 0.9; line-height: 1.3; white-space: nowrap; }
      
      .treemap-block-compact { padding: 9px; }
      .treemap-block-compact .treemap-name { font-size: 13px; }
      .treemap-block-compact .treemap-value { font-size: 15px; }
      .treemap-block-compact .treemap-value-sub { font-size: 9px; }
      .treemap-block-tiny { padding: 4px; }
      .treemap-block-tiny .treemap-block-inner { gap: 2px; }
      .treemap-block-tiny .treemap-name, .treemap-block-tiny .treemap-value { font-size: 11px; }
      .treemap-block-tiny .treemap-value-sub { display: none; }
      .treemap-block-micro .treemap-block-inner { display: none; }

      .treemap-active { color: #fff; }
      .treemap-gap { color: #fff; background: linear-gradient(135deg, #f78787, #E02424); }
      .treemap-other { color: #333; background: #f0f0f0; } /* 为第15名以后的“其他”保留浅色样式 */
      
      .board { background: #FFFFFF; border: 1px solid rgba(var(--primary-rgb), 0.08); border-radius: 16px; padding: 16px; }
      .board-overview { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 16px; align-items: center; padding: 0 2px; margin-bottom: 14px; }
      
      .sim-card { background: #FFFFFF; border: 1px solid rgba(var(--primary-rgb), 0.08); border-radius: 16px; padding: 12px; margin-bottom: 14px; }
      .sim-card-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
      .sim-card-title { font-size: 12px; color: var(--sub); }
      .sim-reset { border: 0; background: transparent; color: var(--primary); font-size: 12px; font-weight: 500; cursor: pointer; padding: 0; }
      .sim-alert { padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(var(--secondary-rgb), 0.1); background: rgba(var(--secondary-rgb), 0.04); color: var(--secondary); font-size: 12px; line-height: 1.6; }
      .sim-meta { margin-top: 8px; font-size: 12px; color: var(--sub); }
      .sim-pills { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
      .sim-pill { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 999px; background: rgba(var(--tertiary-rgb), 0.05); border: 1px solid rgba(var(--tertiary-rgb), 0.1); color: var(--tertiary); font-size: 11px; font-weight: 700; }
      .sim-empty { display: none; }

      /* 下方排行榜样式 */
      .ranking-item { background-color: #fff; border-radius: 8px; padding: 16px 0; border-bottom: 1px solid #f0f0f0; }
      .board .ranking-item:last-child { border-bottom: none; padding-bottom: 0; }
      .board .ranking-item:first-child { padding-top: 0; }
      .ranking-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      .rank-country { display: flex; align-items: center; font-size: 14px; font-weight: 600; color: var(--text); }
      .rank-num { color: #999; margin-right: 8px; font-weight: 700; }
      .country-flag { margin-right: 6px; font-size: 16px; line-height: 1; }
      .sim-toggle { min-height: 28px; padding: 4px 12px; background: #f4f5f7; border: 1px solid transparent; color: #666; border-radius: 6px; font-size: 12px; line-height: 1; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
      .sim-toggle:hover { background: #ebeef2; color: #333; }
      .sim-toggle-active { background: rgba(var(--secondary-rgb), 0.08); color: var(--secondary); }
      .bar-chart-container { display: flex; align-items: center; }
      .bar-chart { flex-grow: 1; height: 32px; background-color: rgba(var(--primary-rgb), 0.06); border-radius: 6px; overflow: hidden; position: relative; margin-right: 12px; }
      .bar-fill { height: 100%; background-color: var(--primary); display: flex; align-items: center; justify-content: flex-start; padding-left: 10px; transition: width 0.3s ease; border-radius: 6px; min-width: fit-content; }
      .ranking-item.offline .bar-fill { background-color: var(--secondary); }
      .absolute-value { color: #fff; font-size: 13px; font-weight: 500; white-space: nowrap; padding-right: 10px; }
      .percentage-value { color: var(--primary); font-weight: 700; font-size: 15px; white-space: nowrap; min-width: 50px; text-align: right; }
      .ranking-item.offline .percentage-value { color: var(--secondary); }
      .section-label { margin: 16px 0 8px; color: var(--sub); font-size: 12px; font-weight: 700; }

      /* === 事件面板样式（原汁原味保留） === */
      .event-panel { display: grid; grid-template-columns: 1fr; gap: 14px; }
      .event-card { background: #FFFFFF; border: 1px solid rgba(var(--primary-rgb), 0.08); border-radius: 16px; padding: 14px; }
      .event-topline { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
      .event-eyebrow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .event-kicker { font-size: 12px; font-weight: 500; color: var(--text); }
      .event-date { font-size: 12px; color: var(--sub); }
      .event-type { display: inline-flex; align-items: center; padding: 5px 9px; border-radius: 999px; background: rgba(var(--tertiary-rgb), 0.06); border: 1px solid rgba(var(--tertiary-rgb), 0.12); color: var(--tertiary); font-size: 11px; font-weight: 500; line-height: 1; }
      .event-card h3 { margin: 0 0 8px; font-size: 16px; color: var(--text); font-weight: 600; }
      .event-summary { margin: 0; font-size: 13px; line-height: 1.7; color: var(--text); }
      .event-impact { margin-top: 12px; padding: 12px; border-radius: 16px; background: rgba(var(--secondary-rgb), 0.04); border: 1px solid rgba(var(--secondary-rgb), 0.1); }
      .event-impact-label { font-size: 11px; color: var(--secondary); font-weight: 700; margin-bottom: 4px; }
      .event-impact-text { font-size: 13px; line-height: 1.7; color: var(--secondary); }

      .footnote { margin-top: 8px; color: var(--sub); font-size: 12px; line-height: 1.5; }

      @media (min-width: 1041px) {
        .layout { width: min(calc(100% - 40px), var(--page-max-width)); }
        .sidebar { border-right: 0; border-bottom: 1px solid rgba(35, 93, 230, 0.12); padding: 18px; }
        .main { padding: 16px 18px 22px; }
        .picker-dialog { border-radius: 16px; margin: auto; height: 500px; transform: translateY(20px); }
        .picker-overlay { align-items: center; } 
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="masthead">
          <div class="brand-lockup">
            <img class="brand-logo" src="./logo-jin10.svg" alt="金十数据 Logo" />
          </div>
          <h1 class="title">全球大宗商品产量版图</h1>
        </div>

        <div class="mode-toolbar">
          <button class="mode-btn active" id="btnModeCommodity">按品种分类 <span class="caret">▼</span></button>
          <button class="mode-btn" id="btnModeCountry">按国家/地区分类 <span class="caret">▼</span></button>
        </div>
      </aside>

      <main class="main">
        <div class="header-row">
          <div class="title-stack">
            <div class="headline-row">
              <h2 id="boardTitle">-</h2>
              <div class="topic-tags" id="boardTags"></div>
            </div>
            <p id="boardSubTitle">-</p>
          </div>
        </div>

        <section class="hero-panel" id="heroPanel"></section>

        <section class="board board-with-tools">
          <div class="board-tools">
            <div class="card sim-card" id="simulationCard">
              <div class="sim-card-head">
                <div class="sim-card-title">断供/制裁推演</div>
                <div class="sim-card-tools">
                  <button class="sim-reset" id="resetSimulationBtn" type="button">清空模拟</button>
                </div>
              </div>
              <div id="simulationBody" class="sim-empty"></div>
            </div>
          </div>
          <div id="board"></div>
        </section>

        <section class="event-panel" id="eventPanel"></section>

        <p class="footnote">
          数据说明：本内容数据均基于公开资料综合测算。其中，矿产及农产品数据主要参考全球权威行业部门公开估算数据；能化板块数据综合采纳国际能源监管组织等市场公开信息。
        </p>
      </main>
    </div>

    <div class="picker-overlay" id="customPickerModal">
      <div class="picker-dialog">
        <div class="picker-header">
          <button class="picker-btn cancel" id="pickerCancel">取消</button>
          <div class="picker-title" id="pickerTitle">选择品种</div>
          <button class="picker-btn confirm" id="pickerConfirm">确定</button>
        </div>
        <div class="picker-body">
          <div class="picker-col-left" id="pickerLeftCol"></div>
          <div class="picker-col-right" id="pickerRightCol"></div>
        </div>
      </div>
    </div>

    <script src="./commodity-ranking-data.js"></script>
    <script>
      const DATA = window.COMMODITY_RANKING_DATA;
      if (!DATA || !Array.isArray(DATA.products)) {
        document.body.innerHTML = "<div style=\"padding:24px;\">未读取到数据文件。</div>";
      }

      const allProducts = DATA.products;
      const simulatedShutdowns = new Map();

      const FLAG_EMOJI_MAP = { "中国": "🇨🇳", "美国": "🇺🇸", "澳大利亚": "🇦🇺", "俄罗斯": "🇷🇺", "印度": "🇮🇳", "巴西": "🇧🇷", "欧盟": "🇪🇺", "阿根廷": "🇦🇷", "印尼": "🇮🇩", "加拿大": "🇨🇦", "墨西哥": "🇲🇽", "秘鲁": "🇵🇪", "智利": "🇨🇱", "沙特阿拉伯": "🇸🇦", "日本": "🇯🇵", "韩国": "🇰🇷", "德国": "🇩🇪", "英国": "🇬🇧", "法国": "🇫🇷", "伊朗": "🇮🇷", "伊拉克": "🇮🇶", "阿联酋": "🇦🇪", "卡塔尔": "🇶🇦", "科威特": "🇰🇼", "马来西亚": "🇲🇾", "泰国": "🇹🇭", "越南": "🇻🇳", "菲律宾": "🇵🇭", "新加坡": "🇸🇬", "南非": "🇿🇦", "刚果（金）": "🇨🇩", "几内亚": "🇬🇳", "马达加斯加": "🇲🇬", "尼日利亚": "🇳🇬", "玻利维亚": "🇧🇴", "波兰": "🇵🇱", "哈萨克斯坦": "🇰🇿", "白俄罗斯": "🇧🇾", "阿曼": "🇴🇲", "缅甸": "🇲🇲", "塔吉克斯坦": "🇹🇯", "中国台湾地区": "🇹🇼" };
      const UNIT_ZH_MAP = { "metric tons": "吨", "thousand metric tons": "千吨", "thousand metric dry tons": "千干吨", "ten thousand metric tons": "万吨", "million metric tons": "万吨", "million 480-lb bales": "百万包（480磅/包）", "million barrels per day": "万桶/日" };
      const VALUE_TYPE_ZH_MAP = { "Production": "产量" };
      
      // 保证你的事件字典能生效
      const HOT_TOPIC_TAGS = window.HOT_TOPIC_TAGS || { "原油": ["地缘政治核心"], "锡": ["半导体咽喉"] };
      
      /* 色板扩充，保障前15名颜色区分度 */
      const TREEMAP_COLORS = [
        "linear-gradient(145deg, #1A56DB 0%, #174BBF 100%)",
        "linear-gradient(145deg, #057A55 0%, #046345 100%)",
        "linear-gradient(145deg, #E02424 0%, #C81E1E 100%)",
        "linear-gradient(145deg, #D97706 0%, #B46305 100%)",
        "linear-gradient(145deg, #7E3AF2 0%, #6830C7 100%)",
        "linear-gradient(145deg, #0694A2 0%, #057A85 100%)",
        "linear-gradient(145deg, #1C64F2 0%, #1A56DB 100%)",
        "linear-gradient(145deg, #16BDCA 0%, #159EA9 100%)",
        "linear-gradient(145deg, #FACA15 0%, #E3B712 100%)",
        "linear-gradient(145deg, #9061F9 0%, #7E55D9 100%)",
        "linear-gradient(145deg, #1E429F 0%, #1A3A8A 100%)",
        "linear-gradient(145deg, #046C4E 0%, #03543F 100%)",
        "linear-gradient(145deg, #9B1C1C 0%, #771D1D 100%)",
        "linear-gradient(145deg, #9F580A 0%, #8A4C09 100%)",
        "linear-gradient(145deg, #5521B5 0%, #4A1D9E 100%)"
      ];

      function getFlagEmoji(countryZh) { return FLAG_EMOJI_MAP[countryZh] || "🏳️"; }
      function toCountryZh(countryEn, countryZh) { if (countryZh && countryZh !== countryEn) return countryZh; return COUNTRY_ZH_PATCH[countryEn] || countryZh || countryEn; }
      function escapeHtml(text) { return String(text ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
      function translateUnit(unit) { return UNIT_ZH_MAP[unit] || unit; }
      function translateValueType(valueType) { return VALUE_TYPE_ZH_MAP[valueType] || "产量"; }
      function normalizeDisplayValue(value, unit) { const num = Number(value || 0); return (unit === "million metric tons" || unit === "million barrels per day") ? num * 100 : num; }
      function formatDisplayValue(value, unit) { return new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 2 }).format(normalizeDisplayValue(value, unit)); }
      function getTopicTags(name) { return HOT_TOPIC_TAGS[name] || ["全球供应链聚焦"]; }
      function renderTopicTagsHtml(tags) { return tags.map(tag => `<span class='topic-tag'>${escapeHtml(tag)}</span>`).join(""); }
      function setBoardTags(tags) { const el = document.getElementById("boardTags"); if (!el) return; if (!tags || !tags.length) { el.style.display = "none"; return; } el.innerHTML = renderTopicTagsHtml(tags); el.style.display = "flex"; }

      function getDisruptionSet(commodityCode) { if (!simulatedShutdowns.has(commodityCode)) simulatedShutdowns.set(commodityCode, new Set()); return simulatedShutdowns.get(commodityCode); }
      function toggleDisruption(commodityCode, countryCode) { const set = getDisruptionSet(commodityCode); set.has(countryCode) ? set.delete(countryCode) : set.add(countryCode); }
      function clearDisruptions(commodityCode) { getDisruptionSet(commodityCode).clear(); }

      function buildCountryProfiles(coreCountries, productList) {
        const coreSet = new Set(coreCountries);
        const profileMap = new Map();
        productList.forEach(product => {
          product.entries.forEach(entry => {
            if (!coreSet.has(entry.country_en)) return;
            if (!profileMap.has(entry.country_en)) profileMap.set(entry.country_en, { country_en: entry.country_en, country_zh: toCountryZh(entry.country_en, entry.country_zh), entries: [] });
            profileMap.get(entry.country_en).entries.push({ commodity_en: product.commodity_en, commodity_zh: product.commodity_zh, share_pct: entry.share_pct, value: entry.value, unit: product.unit, value_type: product.value_type, year: product.year, global_rank: entry.rank });
          });
        });
        return Array.from(profileMap.values()).map(p => ({ ...p, entries: [...p.entries].sort((a, b) => b.share_pct - a.share_pct) })).filter(p => p.entries.length > 0).sort((a, b) => b.entries[0].share_pct - a.entries[0].share_pct);
      }

      function selectedCommodity() { return allProducts.find(c => c.commodity_en === appliedCommodity) || allProducts[0] || null; }
      function selectedCountryProfile() { const profiles = buildCountryProfiles(CORE_COUNTRIES, allProducts); return profiles.find(c => c.country_en === appliedCountry) || profiles[0] || null; }

      // --- 顶部按钮文案动态更新 ---
      function updateButtonTexts() {
        if (appliedMode === 'commodity') {
          const commObj = allProducts.find(p => p.commodity_en === appliedCommodity);
          const commName = commObj ? commObj.commodity_zh : appliedCommodity;
          const majorName = appliedMajor === 'all' ? '全部分类' : appliedMajor;
          document.getElementById('btnModeCommodity').innerHTML = `${majorName}-${commName} <span class="caret">▼</span>`;
          document.getElementById('btnModeCountry').innerHTML = `按国家/地区分类 <span class="caret">▼</span>`;
        } else {
          const contName = CONTINENT_ZH_MAP[appliedContinent] || appliedContinent;
          const countryZh = toCountryZh(appliedCountry);
          document.getElementById('btnModeCountry').innerHTML = `${contName}-${countryZh} <span class="caret">▼</span>`;
          document.getElementById('btnModeCommodity').innerHTML = `按品种分类 <span class="caret">▼</span>`;
        }
      }

      // --- Picker 逻辑 ---
      const pickerModal = document.getElementById('customPickerModal');
      
      function openPicker(mode) {
        tempMode = mode;
        document.getElementById('pickerTitle').innerText = mode === 'commodity' ? '选择品种' : '选择国家/地区';
        
        if (mode === 'commodity') {
          tempMajor = (appliedMode === 'commodity') ? appliedMajor : '矿产';
          tempCommodity = appliedCommodity;
        } else {
          tempContinent = (appliedMode === 'country') ? appliedContinent : 'Asia';
          tempCountry = appliedCountry;
        }
        pickerModal.classList.add('is-open');
        renderPickerLeft(); 
      }

      function renderPickerLeft() {
        const leftCol = document.getElementById('pickerLeftCol');
        let html = '';
        if (tempMode === 'commodity') {
          const majors = ['all', '矿产', '能化', '农产品'];
          const names = ['全部分类', '矿产', '能化', '农产品'];
          majors.forEach((m, i) => html += `<div class="picker-item ${tempMajor === m ? 'active' : ''}" data-val="${m}">${names[i]}</div>`);
        } else {
          const conts = ['all', 'Asia', 'Europe', 'North America', 'South America', 'Africa', 'Oceania'];
          const names = ['全部大洲', '亚洲', '欧洲', '北美洲', '南美洲', '非洲', '大洋洲'];
          conts.forEach((c, i) => html += `<div class="picker-item ${tempContinent === c ? 'active' : ''}" data-val="${c}">${names[i]}</div>`);
        }
        leftCol.innerHTML = html;
        renderPickerRight();
      }

      function renderPickerRight() {
        const rightCol = document.getElementById('pickerRightCol');
        let html = '';
        if (tempMode === 'commodity') {
          let products = tempMajor === 'all' ? allProducts : allProducts.filter(p => p.group_major === tempMajor);
          if (!products.some(p => p.commodity_en === tempCommodity) && products.length > 0) { tempCommodity = products[0].commodity_en; }
          products.forEach(p => html += `<div class="picker-item ${tempCommodity === p.commodity_en ? 'active' : ''}" data-val="${p.commodity_en}">${p.commodity_zh}</div>`);
        } else {
          let profiles = buildCountryProfiles(CORE_COUNTRIES, allProducts);
          if (tempContinent !== 'all') profiles = profiles.filter(p => getContinentEn(p.country_en) === tempContinent);
          if (!profiles.some(p => p.country_en === tempCountry) && profiles.length > 0) { tempCountry = profiles[0].country_en; }
          profiles.forEach(p => html += `<div class="picker-item ${tempCountry === p.country_en ? 'active' : ''}" data-val="${p.country_en}">${p.country_zh}</div>`);
        }
        rightCol.innerHTML = html;
      }

      document.getElementById('pickerLeftCol').addEventListener('click', e => {
        const item = e.target.closest('.picker-item');
        if(item) {
          if(tempMode === 'commodity') tempMajor = item.getAttribute('data-val');
          else tempContinent = item.getAttribute('data-val');
          renderPickerLeft();
        }
      });
      document.getElementById('pickerRightCol').addEventListener('click', e => {
        const item = e.target.closest('.picker-item');
        if(item) {
          if(tempMode === 'commodity') tempCommodity = item.getAttribute('data-val');
          else tempCountry = item.getAttribute('data-val');
          Array.from(document.getElementById('pickerRightCol').children).forEach(el => el.classList.remove('active'));
          item.classList.add('active');
        }
      });
      document.getElementById('pickerCancel').addEventListener('click', () => pickerModal.classList.remove('is-open'));
      
      document.getElementById('pickerConfirm').addEventListener('click', () => {
        appliedMode = tempMode;
        if (appliedMode === 'commodity') { appliedMajor = tempMajor; appliedCommodity = tempCommodity; } 
        else { appliedContinent = tempContinent; appliedCountry = tempCountry; }
        
        document.getElementById('btnModeCommodity').classList.toggle('active', appliedMode === 'commodity');
        document.getElementById('btnModeCountry').classList.toggle('active', appliedMode === 'country');
        
        updateButtonTexts(); // 触发按钮文案更新
        pickerModal.classList.remove('is-open');
        renderBoard();
      });

      document.getElementById('btnModeCommodity').addEventListener('click', () => openPicker('commodity'));
      document.getElementById('btnModeCountry').addEventListener('click', () => openPicker('country'));


      function getCommoditySimulationState(commodity) {
        if (!commodity) return { disruptionSet: new Set(), disruptedEntries: [], activeEntries: [], disruptedValue: 0, remainingTotal: 0, simulationActive: false, gapPct: 0, rankedEntries: [] };
        const set = getDisruptionSet(commodity.commodity_en);
        const disrupted = commodity.entries.filter(e => set.has(e.country_en));
        const active = commodity.entries.filter(e => !set.has(e.country_en));
        const dValue = disrupted.reduce((sum, e) => sum + Number(e.value || 0), 0);
        const rTotal = Math.max(Number(commodity.world_total || 0) - dValue, 0);
        return {
          disruptionSet: set, disruptedEntries: disrupted, activeEntries: active, disruptedValue: dValue, remainingTotal: rTotal, simulationActive: disrupted.length > 0, gapPct: commodity.world_total > 0 ? (dValue / commodity.world_total) * 100 : 0,
          rankedEntries: active.map((e, idx) => ({ ...e, adjusted_rank: idx + 1, adjusted_share: rTotal > 0 ? (Number(e.value || 0) / rTotal) * 100 : 0 }))
        };
      }

      function splitTreemapNodes(nodes) {
        const total = nodes.reduce((sum, n) => sum + n.value, 0);
        let running = 0, bestIndex = 1, smallestDiff = Infinity;
        for (let i = 0; i < nodes.length - 1; i++) { running += nodes[i].value; const diff = Math.abs(total / 2 - running); if (diff < smallestDiff) { smallestDiff = diff; bestIndex = i + 1; } }
        return [nodes.slice(0, bestIndex), nodes.slice(bestIndex)];
      }
      
      function layoutTreemap(nodes, x, y, width, height) {
        if (!nodes.length || width <= 0 || height <= 0) return [];
        if (nodes.length === 1) return [{ ...nodes[0], x, y, width, height }];
        const ordered = [...nodes].sort((a, b) => b.value - a.value);
        const total = ordered.reduce((s, n) => s + n.value, 0);
        const [gA, gB] = splitTreemapNodes(ordered);
        const ratioA = total > 0 ? gA.reduce((s, n) => s + n.value, 0) / total : 0.5;
        if (width >= height) { const wA = width * ratioA; return [...layoutTreemap(gA, x, y, wA, height), ...layoutTreemap(gB, x + wA, y, width - wA, height)]; }
        const hA = height * ratioA; return [...layoutTreemap(gA, x, y, width, hA), ...layoutTreemap(gB, x, y + hA, width, height - hA)];
      }

      function buildTreemapNodes(commodity, simState) {
        const nodes = [];
        if (simState.simulationActive && simState.disruptedValue > 0) {
            nodes.push({ key: "gap", label: "若产生断供", value: simState.disruptedValue, shareLabel: simState.gapPct.toFixed(2) + "%", kind: "gap" });
        }
        
        // 【核心修改】提取前 15 名用于展示
        const top15 = simState.rankedEntries.slice(0, 15);
        const activeNodes = top15.map((e, idx) => ({ 
            key: e.country_en, 
            label: toCountryZh(e.country_en, e.country_zh), 
            value: Number(e.value || 0), 
            shareLabel: (simState.simulationActive ? e.adjusted_share : e.share_pct).toFixed(2) + "%", 
            kind: "active", 
            color: TREEMAP_COLORS[idx % TREEMAP_COLORS.length] 
        }));
        nodes.push(...activeNodes);

        // 第 16 名及以后合并为“其他”
        const otherEntries = simState.rankedEntries.slice(15);
        if (otherEntries.length > 0) {
            const otherValue = otherEntries.reduce((s, e) => s + Number(e.value || 0), 0);
            nodes.push({
                key: "other",
                label: "其他",
                value: otherValue,
                shareLabel: ((otherValue / commodity.world_total) * 100).toFixed(2) + "%",
                kind: "other"
            });
        }

        return nodes.filter(n => n.value > 0);
      }

      function renderHeroPanel(commodity, simState) {
        const el = document.getElementById("heroPanel");
        if (appliedMode !== "commodity" || !commodity) { el.style.display = "none"; return; }
        el.style.display = "block";
        const layout = layoutTreemap(buildTreemapNodes(commodity, simState), 0, 0, 100, 100);
        
        const html = layout.map(node => {
          const area = node.width * node.height;
          const sizeClass = (node.width < 10 || node.height < 10 || area < 100) ? " treemap-block-micro" 
                            : (area < 250) ? " treemap-block-tiny" 
                            : (area < 500) ? " treemap-block-compact" : "";
          
          return `<div class='treemap-block ${node.kind === "gap" ? "treemap-gap" : node.kind === "other" ? "treemap-other" : "treemap-active"} ${sizeClass}' style='left:${node.x}%;top:${node.y}%;width:${node.width}%;height:${node.height}%;${node.kind === "active" ? "background:" + node.color : ""}'>
            <div class='treemap-block-inner'><div><div class='treemap-name'>${escapeHtml(node.label)}</div></div>
            <div><div class='treemap-value'>${escapeHtml(node.kind === "gap" ? node.shareLabel : formatDisplayValue(node.value, commodity.unit))}</div><div class='treemap-value-sub'>${node.shareLabel}</div></div></div></div>`;
        }).join("");
        
        el.innerHTML = `<div class='hero-title'>${commodity.year}年全球${escapeHtml(commodity.commodity_zh)}${simState.simulationActive ? "可供总量 " : "供应总量 "}<strong>${formatDisplayValue(simState.simulationActive ? simState.remainingTotal : commodity.world_total, commodity.unit)}</strong>${translateUnit(commodity.unit)}</div><div class='treemap-shell'><div class='treemap'>${html}</div></div>`;
      }

      function renderSimulationPanel(commodity, disruptedEntries, remainingTotal, gapPct) {
        const simCard = document.getElementById("simulationCard");
        const simBody = document.getElementById("simulationBody");
        if (appliedMode !== "commodity" || !disruptedEntries.length) { simCard.style.display = "none"; return; }
        simCard.style.display = "block";
        simBody.className = "";
        simBody.innerHTML = `<div class='sim-alert'>若执行断供，全球将出现 <strong>${gapPct.toFixed(2)}%</strong> 的绝对缺口。</div><div class='sim-meta'>剩余可供量：${formatDisplayValue(remainingTotal, commodity.unit)} ${translateUnit(commodity.unit)}</div><div class='sim-pills'>${disruptedEntries.map(e => `<span class='sim-pill'>${escapeHtml(toCountryZh(e.country_en, e.country_zh))}</span>`).join("")}</div>`;
      }

      // 【完全恢复】的历史冲击面板渲染
      function renderEventPanel(commodity) {
        const panel = document.getElementById("eventPanel");
        if (!commodity || appliedMode !== "commodity") {
            panel.innerHTML = "";
            return;
        }
        
        // 调用全局 EVENT_CASES，若无数据则自动隐藏面板
        const cases = window.EVENT_CASES && window.EVENT_CASES[commodity.commodity_zh] ? window.EVENT_CASES[commodity.commodity_zh] : [];
        if (!cases || cases.length === 0) {
            panel.innerHTML = "";
            return;
        }
        
        let html = `<div class='section-label'>历史断供/冲击复盘</div>`;
        html += cases.map(c => `
            <div class="event-card">
                <div class="event-topline">
                    <div class="event-eyebrow">
                        <span class="event-type">${escapeHtml(c.type || '历史事件')}</span>
                        <span class="event-kicker">${escapeHtml(c.kicker || '')}</span>
                    </div>
                    <span class="event-date">${escapeHtml(c.date || '')}</span>
                </div>
                <h3>${escapeHtml(c.title || '')}</h3>
                <p class="event-summary">${escapeHtml(c.summary || '')}</p>
                ${c.impact ? `<div class="event-impact"><div class="event-impact-label">核心影响</div><div class="event-impact-text">${escapeHtml(c.impact)}</div></div>` : ''}
            </div>
        `).join("");
        
        panel.innerHTML = html;
      }

      function renderCommodityBoard() {
        const commodity = selectedCommodity();
        const boardEl = document.getElementById("board");
        if (!commodity) { boardEl.innerHTML = "<div>暂无数据</div>"; document.getElementById("eventPanel").innerHTML = ""; return; }

        const simState = getCommoditySimulationState(commodity);
        const { disruptedEntries, activeEntries, remainingTotal, simulationActive, rankedEntries } = simState;
        
        document.getElementById("boardTitle").textContent = commodity.commodity_zh + "供应排行";
        document.getElementById("boardSubTitle").textContent = `口径：${translateValueType(commodity.value_type)} | 年份：${commodity.year} | 单位：${translateUnit(commodity.unit)}`;
        setBoardTags(getTopicTags(commodity.commodity_zh));
        
        renderHeroPanel(commodity, simState);
        renderSimulationPanel(commodity, disruptedEntries, remainingTotal, simState.gapPct);
        renderEventPanel(commodity); // 触发事件面板渲染
        
        const maxShare = Math.max(...rankedEntries.map(e => simulationActive ? e.adjusted_share : e.share_pct), 1);

        const rowsHtml = rankedEntries.map((entry, idx) => {
          const effectiveShare = simulationActive ? entry.adjusted_share : entry.share_pct;
          const absoluteValue = formatDisplayValue(entry.value, commodity.unit) + " " + translateUnit(commodity.unit);
          const widthPct = Math.max(5, (effectiveShare / maxShare) * 100); 
          const countryZh = toCountryZh(entry.country_en, entry.country_zh);

          return `
            <div class="ranking-item">
              <div class="ranking-top">
                <div class="rank-country">
                  <span class="rank-num">#${idx + 1}</span>
                  <span class="country-flag">${getFlagEmoji(countryZh)}</span>
                  <span class="country-name">${escapeHtml(countryZh)}</span>
                </div>
                <button class="sim-toggle" data-sim-commodity="${escapeHtml(commodity.commodity_en)}" data-sim-country="${escapeHtml(entry.country_en)}">模拟停产</button>
              </div>
              <div class="bar-chart-container">
                <div class="bar-chart">
                  <div class="bar-fill" style="width: ${widthPct.toFixed(1)}%;">
                    <span class="absolute-value">${absoluteValue}</span>
                  </div>
                </div>
                <span class="percentage-value">${effectiveShare.toFixed(2)}%</span>
              </div>
            </div>
          `;
        }).join("");

        const disruptedRowsHtml = disruptedEntries.length ? 
          "<div class='section-label'>已模拟停产区域</div>" + disruptedEntries.map(entry => {
            const countryZh = toCountryZh(entry.country_en, entry.country_zh);
            const widthPct = Math.max(5, (entry.share_pct / maxShare) * 100);
            return `
              <div class="ranking-item offline">
                <div class="ranking-top">
                  <div class="rank-country"><span class="rank-num">×</span><span class="country-flag">${getFlagEmoji(countryZh)}</span><span class="country-name">${escapeHtml(countryZh)}</span></div>
                  <button class="sim-toggle sim-toggle-active" data-sim-commodity="${escapeHtml(commodity.commodity_en)}" data-sim-country="${escapeHtml(entry.country_en)}">恢复供应</button>
                </div>
                <div class="bar-chart-container">
                  <div class="bar-chart"><div class="bar-fill" style="width: ${widthPct.toFixed(1)}%;"><span class="absolute-value">${formatDisplayValue(entry.value, commodity.unit)} ${translateUnit(commodity.unit)}</span></div></div>
                  <span class="percentage-value">缺口 ${entry.share_pct.toFixed(2)}%</span>
                </div>
              </div>
            `;
          }).join("") : "";

        boardEl.innerHTML = rowsHtml + disruptedRowsHtml;
      }

      function renderCountryBoard() {
        const profile = selectedCountryProfile();
        const boardEl = document.getElementById("board");
        if (!profile) { boardEl.innerHTML = "<div>暂无数据</div>"; document.getElementById("eventPanel").innerHTML = ""; return; }
        
        document.getElementById("boardTitle").textContent = profile.country_zh + "核心品种贡献";
        setBoardTags([]);
        renderHeroPanel(null, null);
        renderSimulationPanel(null, [], 0, 0);
        document.getElementById("eventPanel").innerHTML = ""; // 国家模式清空事件
        document.getElementById("boardSubTitle").textContent = "按该国家/地区在各品种全球占比排序";

        const entries = profile.entries;
        const maxShare = Math.max(...entries.map((e) => e.share_pct), 1);

        boardEl.innerHTML = entries.map((entry, idx) => {
          const widthPct = Math.max(3, (entry.share_pct / maxShare) * 100);
          return `
            <div class="ranking-item">
              <div class="ranking-top">
                <div class="rank-country">
                  <span class="rank-num">#${idx + 1}</span>
                  <span class="country-name">${escapeHtml(entry.commodity_zh)}</span>
                  ${renderTopicTagsHtml(getTopicTags(entry.commodity_zh))}
                </div>
              </div>
              <div class="bar-chart-container">
                <div class="bar-chart">
                  <div class="bar-fill" style="width: ${widthPct.toFixed(1)}%;">
                     <span class="absolute-value">${formatDisplayValue(entry.value, entry.unit)} ${translateUnit(entry.unit)}</span>
                  </div>
                </div>
                <span class="percentage-value">${entry.share_pct.toFixed(2)}%</span>
              </div>
            </div>
          `;
        }).join("");
      }

      function renderBoard() {
        if (appliedMode === "country") renderCountryBoard();
        else renderCommodityBoard();
      }

      document.getElementById('board').addEventListener("click", (event) => {
        const btn = event.target.closest(".sim-toggle");
        if (!btn) return;
        toggleDisruption(btn.getAttribute("data-sim-commodity"), btn.getAttribute("data-sim-country"));
        renderBoard();
      });
      document.getElementById('resetSimulationBtn').addEventListener("click", () => {
        if(appliedMode !== 'commodity') return;
        clearDisruptions(appliedCommodity); renderBoard();
      });

      // 初始化文案及看板
      updateButtonTexts();
      renderBoard();
    </script>
  </body>
