<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全球大宗商品产量版图 - 金十数据</title>
    <style>
      :root {
        --primary: #1A56DB;
        --primary-soft: rgba(26, 86, 219, 0.08);
        --text: #111111;
        --sub: #96918a;
        --bg: #FFFFFF;
        --line: rgba(26, 86, 219, 0.12);
        --panel-bg: #f5f7fa;
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { margin: 0; font-family: "Source Han Sans", "Noto Sans CJK SC", sans-serif; color: var(--text); background: var(--bg); }

      .layout { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

      /* --- Sidebar / Header --- */
      .sidebar { padding: 18px 16px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 16px; }
      .brand-logo { width: 104px; height: auto; margin-bottom: 4px; }
      .title { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.03em; }

      /* --- 统计方式 Tab (新版 UI) --- */
      .toolbar-primary-new {
        background: var(--panel-bg);
        border-radius: 12px;
        padding: 4px;
        display: flex;
        position: relative;
        z-index: 1;
      }
      .tab-item { flex: 1; position: relative; z-index: 2; cursor: pointer; }
      .tab-item input { display: none; }
      .tab-box {
        display: flex; align-items: center; justify-content: center;
        height: 40px; font-size: 14px; color: #666; font-weight: 500;
        transition: color 0.3s ease;
      }
      .tab-item input:checked + .tab-box { color: var(--primary); font-weight: 700; }
      
      /* 滑动背景 */
      .tab-slider {
        position: absolute; top: 4px; left: 4px; height: 40px;
        width: calc(50% - 4px); background: #fff; border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1;
      }
      .toolbar-primary-new:has(input[value="country"]:checked) .tab-slider { transform: translateX(100%); }

      /* --- Picker 选择器 --- */
      .picker-container {
        background: #fff; border: 1px solid var(--line); border-radius: 16px;
        margin-top: 4px; overflow: hidden; display: block;
      }
      .picker-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 12px 16px; border-bottom: 1px solid #f0f2f5;
      }
      .picker-title { font-size: 15px; font-weight: 700; color: #333; }
      .picker-btn { background: none; border: none; font-size: 14px; padding: 8px; cursor: pointer; }
      .picker-btn.cancel { color: var(--sub); }
      .picker-btn.confirm { color: var(--primary); font-weight: 700; }

      .picker-body { display: flex; height: 180px; position: relative; padding: 0 8px; }
      .picker-column { flex: 1; position: relative; overflow: hidden; }
      
      /* 模拟滚动列表 */
      .picker-column select {
        width: 100%; height: 100%; border: none; background: transparent;
        font-size: 16px; color: #333; text-align: center; outline: none;
        appearance: none; -webkit-appearance: none;
        position: relative; z-index: 3;
      }
      .picker-column select option { padding: 10px 0; background: #fff; }

      /* 视觉装饰：高亮框 & 遮罩 */
      .picker-highlight {
        position: absolute; top: 50%; left: 6px; right: 6px; height: 36px;
        transform: translateY(-50%); background: var(--panel-bg); border-radius: 8px;
        z-index: 1; pointer-events: none;
      }
      .picker-mask {
        position: absolute; left: 0; right: 0; height: 72px; z-index: 2; pointer-events: none;
      }
      .mask-top { top: 0; background: linear-gradient(to bottom, #fff 20%, rgba(255,255,255,0)); }
      .mask-bottom { bottom: 0; background: linear-gradient(to top, #fff 20%, rgba(255,255,255,0)); }

      /* --- 看板内容 --- */
      .main { padding: 16px; background: #f8f9fb; flex: 1; }
      .board-header { margin-bottom: 16px; }
      .board-header h2 { margin: 0; font-size: 22px; color: var(--text); }
      .board-header p { margin: 4px 0 0; font-size: 12px; color: var(--sub); }
      
      .board-card { background: #fff; border-radius: 16px; padding: 16px; border: 1px solid rgba(0,0,0,0.04); }
      .row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; gap: 12px; }
      .row:last-child { border-bottom: none; }
      .rank { font-weight: 700; color: #999; width: 24px; }
      .info { flex: 1; }
      .name { font-weight: 700; font-size: 14px; margin-bottom: 6px; display: block; }
      .bar-bg { background: #f0f4ff; height: 8px; border-radius: 4px; overflow: hidden; width: 100%; }
      .bar-fill { height: 100%; background: var(--primary); border-radius: 4px; }
      .val { font-weight: 700; font-size: 14px; color: var(--primary); text-align: right; min-width: 60px; }

      /* 动画效果 */
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .board-card { animation: slideIn 0.4s ease-out; }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <img class="brand-logo" src="./logo-jin10.svg" alt="金十数据" />
        <h1 class="title">全球大宗商品产量版图</h1>

        <div class="toolbar-primary-new">
          <div class="tab-slider"></div>
          <label class="tab-item">
            <input type="radio" name="viewMode" value="commodity" checked />
            <span class="tab-box">按品种分类</span>
          </label>
          <label class="tab-item">
            <input type="radio" name="viewMode" value="country" />
            <span class="tab-box">按国家/地区分类</span>
          </label>
        </div>

        <div class="picker-container">
          <div class="picker-header">
            <button class="picker-btn cancel" id="cancelBtn">取消</button>
            <div class="picker-title" id="pickerTitle">选择品种</div>
            <button class="picker-btn confirm" id="confirmBtn">确定</button>
          </div>
          
          <div class="picker-body">
            <div class="picker-column">
              <div class="picker-mask mask-top"></div>
              <select id="majorCategorySelect" size="5">
                <option value="all">全部分类</option>
                <option value="矿产">矿产</option>
                <option value="能化">能化</option>
                <option value="农产品">农产品</option>
              </select>
              <div class="picker-highlight"></div>
              <div class="picker-mask mask-bottom"></div>
            </div>

            <div class="picker-column" id="commodityCol">
              <div class="picker-mask mask-top"></div>
              <select id="commoditySelect" size="5"></select>
              <div class="picker-highlight"></div>
              <div class="picker-mask mask-bottom"></div>
            </div>

            <div class="picker-column" id="countryCol" style="display: none;">
              <div class="picker-mask mask-top"></div>
              <select id="countrySelect" size="5"></select>
              <div class="picker-highlight"></div>
              <div class="picker-mask mask-bottom"></div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="board-header">
          <h2 id="displayTitle">-</h2>
          <p id="displaySubTitle">-</p>
        </div>
        <div class="board-card" id="listContent">
          </div>
      </main>
    </div>

    <script src="./commodity-ranking-data.js"></script>
    <script>
      const DATA = window.COMMODITY_RANKING_DATA;
      const state = {
        viewMode: 'commodity',
        major: 'all',
        commodity: 'Silver',
        country: 'China',
        // 暂存值，用于取消操作
        temp: { major: 'all', commodity: 'Silver', country: 'China' }
      };

      // --- 初始化数据 ---
      function initSelects() {
        const products = DATA.products;
        
        // 填充品种
        const cSelect = document.getElementById('commoditySelect');
        const filteredProducts = state.major === 'all' ? products : products.filter(p => p.group_major === state.major);
        cSelect.innerHTML = filteredProducts.map(p => `<option value="${p.commodity_en}">${p.commodity_zh}</option>`).join('');
        
        // 填充国家 (提取去重后的国家列表)
        const countrySelect = document.getElementById('countrySelect');
        const countries = [];
        const seen = new Set();
        products.forEach(p => p.entries.forEach(e => {
          if(!seen.has(e.country_en)) {
            countries.push({ en: e.country_en, zh: e.country_zh });
            seen.add(e.country_en);
          }
        }));
        countrySelect.innerHTML = countries.map(c => `<option value="${c.en}">${c.zh}</option>`).join('');
      }

      // --- 核心渲染逻辑 ---
      function renderBoard() {
        const listEl = document.getElementById('listContent');
        const titleEl = document.getElementById('displayTitle');
        const subEl = document.getElementById('displaySubTitle');

        if (state.viewMode === 'commodity') {
          const product = DATA.products.find(p => p.commodity_en === state.commodity);
          titleEl.innerText = product.commodity_zh + '供应排行';
          subEl.innerText = `数据年份：${product.year} | 单位：${product.unit}`;
          
          const maxVal = Math.max(...product.entries.map(e => e.value));
          listEl.innerHTML = product.entries.map((e, i) => `
            <div class="row">
              <span class="rank">#${i+1}</span>
              <div class="info">
                <span class="name">${e.country_zh}</span>
                <div class="bar-bg"><div class="bar-fill" style="width:${(e.value/maxVal*100)}%"></div></div>
              </div>
              <span class="val">${e.share_pct}%</span>
            </div>
          `).join('');
        } else {
          // 国家模式
          titleEl.innerText = document.querySelector('#countrySelect option:checked')?.text + ' 资源版图';
          subEl.innerText = '在该国家占全球产量比重较高的品种';
          // 逻辑同理，此处略作展示
          listEl.innerHTML = '<div style="color:#999; text-align:center; padding:20px;">该国家数据加载中...</div>';
        }
      }

      // --- 交互事件 ---
      document.querySelectorAll('input[name="viewMode"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
          state.viewMode = e.target.value;
          const isComm = state.viewMode === 'commodity';
          document.getElementById('commodityCol').style.display = isComm ? 'block' : 'none';
          document.getElementById('countryCol').style.display = isComm ? 'none' : 'block';
          document.getElementById('pickerTitle').innerText = isComm ? '选择品种' : '选择国家';
          initSelects();
        });
      });

      document.getElementById('majorCategorySelect').addEventListener('change', (e) => {
        state.major = e.target.value;
        initSelects();
      });

      // 确定按钮
      document.getElementById('confirmBtn').addEventListener('click', () => {
        state.commodity = document.getElementById('commoditySelect').value;
        state.country = document.getElementById('countrySelect').value;
        // 同步暂存值
        state.temp = { major: state.major, commodity: state.commodity, country: state.country };
        renderBoard();
      });

      // 取消按钮：回滚到暂存值
      document.getElementById('cancelBtn').addEventListener('click', () => {
        state.major = state.temp.major;
        document.getElementById('majorCategorySelect').value = state.major;
        initSelects();
        document.getElementById('commoditySelect').value = state.temp.commodity;
        document.getElementById('countrySelect').value = state.temp.country;
      });

      // 初始化
      initSelects();
      renderBoard();
    </script>
  </body>
</html>
